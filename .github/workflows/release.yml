name: Release

on:
  push:
    tags:
      - "v*.*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: GalManager ${{ github.ref_name }}
          releaseBody: |
            ## 安装方式
            - **推荐**：下载 `.exe`（NSIS 安装包），双击安装
            - 或下载 `.msi`（Windows Installer）

            ---
            完整变更请查看 [提交记录](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }})
          releaseDraft: false
          prerelease: false
